# Distinct project name so the dev volumes/network never collide with the
# full prod-like stack in docker-compose.yml (which both otherwise default to
# the "sovecom" project and would share a `pgdata` volume — a stale-data trap).
name: sovecom-dev

services:
  postgres:
    image: pgvector/pgvector:pg17 # postgres 17 + pgvector (embedding columns need the `vector` extension)
    environment:
      POSTGRES_DB: sovecom_dev
      POSTGRES_USER: sovecom
      POSTGRES_PASSWORD: devpassword
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'sovecom']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.8
    environment:
      MEILI_MASTER_KEY: devkey
    ports:
      - '7700:7700'
    # No healthcheck: the Meilisearch image ships neither curl nor wget, so a
    # CMD healthcheck can't reliably probe /health from inside the container.

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
