services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: sovecom
      POSTGRES_USER: sovecom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'sovecom']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sovecom

  redis:
    image: redis:7
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:?REDIS_PASSWORD must be set}']
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sovecom

  meilisearch:
    image: getmeili/meilisearch:v1.8
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY must be set}
    volumes:
      - meili_data:/meili_data
    networks:
      - sovecom

  # One-shot migration service. Runs drizzle-kit migrate then exits 0.
  # api depends_on this completing successfully before starting.
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: builder
    working_dir: /app/apps/api
    command: sh -lc "npx drizzle-kit migrate --config=drizzle.config.ts && node dist/database/seed.js"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://sovecom:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/sovecom
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sovecom
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgres://sovecom:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/sovecom
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY must be set}
      STORAGE_SIGNING_SECRET: ${STORAGE_SIGNING_SECRET:?STORAGE_SIGNING_SECRET must be set}
      AUDIT_EMAIL_SALT: ${AUDIT_EMAIL_SALT:?AUDIT_EMAIL_SALT must be set}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Stripe (optional — stores without Stripe still boot)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # CORS allowlists for admin SPA and storefront
      ADMIN_ORIGIN: https://admin.${SOVECOM_DOMAIN:-localhost}
      STORE_ORIGIN: https://${SOVECOM_DOMAIN:-localhost}
      # Local storage path (writable by nodejs user via named volume)
      LOCAL_STORAGE_PATH: /data/uploads
      # Public base for local-storage asset URLs. Without it the local adapter
      # falls back to http://localhost:3000, which is unreachable from a browser —
      # uploaded product images render blank. The api host is proxied by Caddy.
      PUBLIC_BASE_URL: https://api.${SOVECOM_DOMAIN:-localhost}
    volumes:
      - uploads:/data/uploads
      # Installed modules (ingest target, MODULES_DATA_PATH=/data/modules) — persist across
      # container recreation/upgrades, else installed modules vanish on `up -d`.
      - modules:/data/modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    networks:
      - sovecom
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
      # No build-time VITE_API_BASE_URL — the API base is injected at container start
      # via API_BASE_URL below, so the same image works on any domain (publishable to GHCR).
    environment:
      API_BASE_URL: https://api.${SOVECOM_DOMAIN:-localhost}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sovecom

  setup:
    build:
      context: .
      dockerfile: docker/Dockerfile.setup
      # No build-time VITE_API_BASE_URL — see admin comment above.
    environment:
      API_BASE_URL: https://api.${SOVECOM_DOMAIN:-localhost}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sovecom

  storefront:
    build:
      context: .
      dockerfile: docker/Dockerfile.storefront
      # No NEXT_PUBLIC_API_BASE_URL build arg — API base is resolved at request time from
      # process.env.API_BASE_URL (server components) and window.__SOVECOM__ (client components).
    environment:
      NODE_ENV: production
      # Public URL for client-side API calls (browser → API, must be publicly reachable).
      API_BASE_URL: https://api.${SOVECOM_DOMAIN:-localhost}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sovecom

  caddy:
    image: caddy:2
    environment:
      SOVECOM_DOMAIN: ${SOVECOM_DOMAIN:-localhost}
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - admin
      - setup
      - storefront
    networks:
      - sovecom

  # MailHog - SMTP sink for setup wizard email OTP. Profile: verify
  # Web UI: http://<host-ip>:8025
  mailhog:
    image: mailhog/mailhog:latest
    profiles:
      - verify
    ports:
      - '8025:8025'
    networks:
      - sovecom

volumes:
  pgdata:
  meili_data:
  caddy_data:
  caddy_config:
  uploads:
  modules:

networks:
  sovecom:
    driver: bridge
