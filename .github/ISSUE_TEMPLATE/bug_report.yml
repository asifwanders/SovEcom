name: 🐛 Bug Report
description: Report a reproducible problem in SovEcom.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        ⚠️ **Do not report security vulnerabilities here.** Follow our [Security Policy](../../SECURITY.md) instead.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: This is not a security vulnerability (those go to security@sovecom.io).
          required: true
        - label: I searched existing issues and did not find a duplicate.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include logs, stack traces, or screenshots if relevant.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: SovEcom version/commit, OS, Node version, deployment topology (docker-compose, managed DB, etc.)
      placeholder: |
        - SovEcom: v0.0.x / commit abc1234
        - OS: Ubuntu 24.04
        - Node: 20.x
        - Deployment: docker-compose
    validations:
      required: true
