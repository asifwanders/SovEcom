name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Least-privilege top-level; individual jobs override where needed.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -------------------------------------------------------------------------
  # 1. TEST — mirrors the blocking gates from ci.yml
  # -------------------------------------------------------------------------
  test:
    name: Test gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: sovecom
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sovecom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sovecom"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      meilisearch:
        image: getmeili/meilisearch:v1.8
        env:
          MEILI_MASTER_KEY: testkey
          MEILI_NO_ANALYTICS: 'true'
        ports:
          - 7700:7700
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: API e2e (no live services required)
        run: pnpm --filter @sovecom/api test:e2e

      - name: OpenAPI drift guard
        run: |
          pnpm --filter @sovecom/api openapi:dump
          pnpm --filter @sovecom/client-js generate
          if ! git diff --exit-code -- apps/api/openapi.json packages/client-js/src/generated/api.ts; then
            echo "::error::OpenAPI spec or generated client is out of date." >&2
            exit 1
          fi

      - name: Start MinIO
        # Same pinned image as docker-compose.dev; health-checked with the runner's curl.
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-11-07T00-52-20Z server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then echo "minio ready"; exit 0; fi
            sleep 2
          done
          echo "minio did not become ready" >&2
          docker logs minio || true
          exit 1

      - name: Wait for Meilisearch
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7700/health; then echo "meilisearch ready"; exit 0; fi
            sleep 2
          done
          echo "meilisearch did not become ready" >&2
          exit 1

      - name: Integration tests
        env:
          DATABASE_URL: postgres://sovecom:test@localhost:5432/sovecom_test
          REDIS_URL: redis://localhost:6379
          MEILISEARCH_URL: http://localhost:7700
          MEILI_MASTER_KEY: testkey
          S3_ENDPOINT: http://localhost:9000
          S3_BUCKET: sovecom-test
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_FORCE_PATH_STYLE: 'true'
          S3_REGION: us-east-1
        run: pnpm --filter @sovecom/api test:integration

  # -------------------------------------------------------------------------
  # 2. DOCKER — multi-arch images pushed to GHCR
  # -------------------------------------------------------------------------
  docker:
    name: Docker — ${{ matrix.app }}
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            dockerfile: docker/Dockerfile.api
            image: ghcr.io/asifwanders/sovecom-api
          - app: admin
            dockerfile: docker/Dockerfile.admin
            image: ghcr.io/asifwanders/sovecom-admin
          - app: setup
            dockerfile: docker/Dockerfile.setup
            image: ghcr.io/asifwanders/sovecom-setup
          - app: storefront
            dockerfile: docker/Dockerfile.storefront
            image: ghcr.io/asifwanders/sovecom-storefront
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Resolve build args that vary per app. These are baked into the image at build time
      # (Vite/Next public env vars) and must be set before the Docker build step.
      # Set VITE_API_BASE_URL / NEXT_PUBLIC_API_BASE_URL via GitHub Actions Variables (vars.*) on the repo.
      # Fallback to the placeholder so the image always builds even without the var configured.
      - name: Resolve build args
        id: build_args
        env:
          APP: ${{ matrix.app }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.example.com' }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://api.example.com' }}
        run: |
          case "$APP" in
            admin|setup)
              echo "args=VITE_API_BASE_URL=$VITE_API_BASE_URL" >> "$GITHUB_OUTPUT"
              ;;
            storefront)
              echo "args=NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "args=" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref_name, 'v0.') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # amd64 only: emulated arm64 (QEMU) builds of the heavy Node images (api,
          # storefront) OOM/hang on hosted runners. Restore arm64 via native arm runners later.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.build_args.outputs.args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # 3. NPM — publish the 4 public packages
  # -------------------------------------------------------------------------
  npm:
    name: Publish npm packages
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance attestation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: |
          pnpm --filter @sovecom/module-sdk build
          pnpm --filter @sovecom/theme-sdk build
          pnpm --filter @sovecom/client-js build
          pnpm --filter create-sovecom-module build
          pnpm --filter create-sovecom-theme build

      # Determine the npm dist-tag. Stable tags → "latest"; pre-release tags → the
      # pre-release identifier (rc, beta, alpha). Examples:
      #   v1.2.3        → latest
      #   v1.2.3-rc.1   → rc
      #   v1.2.3-beta.0 → beta
      - name: Determine dist-tag
        id: tag
        run: |
          REF="${{ github.ref_name }}"
          VERSION="${REF#v}"
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-'; then
            DIST_TAG=$(echo "$VERSION" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+-([a-zA-Z]+).*/\1/')
          else
            DIST_TAG="latest"
          fi
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish @sovecom/module-sdk
        working-directory: packages/module-sdk
        run: |
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "$name@$ver already published — skipping"
          else
            pnpm publish --access public --provenance --no-git-checks --tag ${{ steps.tag.outputs.dist_tag }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @sovecom/theme-sdk
        working-directory: packages/theme-sdk
        run: |
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "$name@$ver already published — skipping"
          else
            pnpm publish --access public --provenance --no-git-checks --tag ${{ steps.tag.outputs.dist_tag }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @sovecom/client-js
        working-directory: packages/client-js
        run: |
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "$name@$ver already published — skipping"
          else
            pnpm publish --access public --provenance --no-git-checks --tag ${{ steps.tag.outputs.dist_tag }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-sovecom-module
        working-directory: packages/create-sovecom-module
        run: |
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "$name@$ver already published — skipping"
          else
            pnpm publish --access public --provenance --no-git-checks --tag ${{ steps.tag.outputs.dist_tag }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-sovecom-theme
        working-directory: packages/create-sovecom-theme
        run: |
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "$name@$ver already published — skipping"
          else
            pnpm publish --access public --provenance --no-git-checks --tag ${{ steps.tag.outputs.dist_tag }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # -------------------------------------------------------------------------
  # 4. RELEASE — create the GitHub Release with auto-generated notes
  # -------------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: [docker, npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine if prerelease
        id: prerelease
        run: |
          REF="${{ github.ref_name }}"
          if echo "$REF" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-(rc|beta|alpha)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
