name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    # CodeQL SARIF upload requires GitHub code scanning, which on a private repo needs GitHub
    # Advanced Security. This job is gated to public visibility and auto-activates when the repo
    # goes public. The active CVE gate while private is the blocking `audit` (pnpm audit) job in
    # ci.yml.
    if: github.event.repository.visibility == 'public'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript
          # Run the extended security query suite for broader vulnerability coverage.
          queries: security-extended
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: '/language:javascript-typescript'
