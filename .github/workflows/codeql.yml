name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    # CodeQL SARIF upload requires GitHub code scanning, which on a private repo needs GitHub
    # Advanced Security. This job is gated to public visibility and auto-activates when the repo
    # goes public. The active CVE gate while private is the blocking `audit` (pnpm audit) job in
    # ci.yml.
    if: github.event.repository.visibility == 'public'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: javascript-typescript
          # Run the extended security query suite for broader vulnerability coverage.
          queries: security-extended
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: '/language:javascript-typescript'
