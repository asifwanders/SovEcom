name: Supply Chain Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday at 04:15 UTC
    - cron: '15 4 * * 1'

permissions:
  contents: read

jobs:
  # Secret scanning via Gitleaks — blocks on any detected secret pattern.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: gitleaks-action v2 requires a (free) license for private-org repos.
          # Set the GITLEAKS_LICENSE repo secret to silence the notice; scanning runs regardless.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # Generate a CycloneDX SBOM for the full workspace and upload as a CI artifact.
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate CycloneDX SBOM
        # cdxgen reads pnpm-lock.yaml + the installed node_modules natively.
        # (@cyclonedx/cyclonedx-npm only understands npm's package-lock.json, which
        # a pnpm workspace never produces.)
        run: pnpm dlx @cyclonedx/cdxgen@11 --type pnpm --output sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
