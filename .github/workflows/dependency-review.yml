name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    # dependency-review-action needs the GitHub dependency graph, which on a private repo
    # requires GitHub Advanced Security. This job is gated to public visibility and
    # auto-activates when the repo goes public. The active CVE gate while private is the
    # blocking `audit` (pnpm audit) job in ci.yml.
    if: github.event.repository.visibility == 'public'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
